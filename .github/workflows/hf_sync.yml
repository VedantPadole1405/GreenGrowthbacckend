name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        run: |
          # 1. Register the credentials safely in the Git environment
          git config --global credential.helper store
          echo "https://Vedant1405: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@huggingface.co" > ~/.git-credentials
          
          # 2. Push directly using the official Space Git link
          git push --force https://huggingface.co/spaces/Vedant1405/GreenGrowth main:main
