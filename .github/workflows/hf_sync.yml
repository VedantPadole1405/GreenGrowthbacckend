name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Added refs/heads/main:refs/heads/main to ensure strict branch matching
        run: git push --force https://Vedant1405:$HF_TOKEN@huggingface.co/spaces/Vedant1405/GreenGrowth main:main
